description = "Acione o `security-reviewer` para uma análise de segurança focada."
prompt = """
Acione o `@{agents/security-reviewer.md}` para uma análise de segurança focada.

## Escopo
- Se `$ARGUMENTS` estiver vazio, analise os arquivos alterados na branch atual (`git diff main...HEAD`)
- Se `$ARGUMENTS` contiver um caminho ou módulo, foque nele

