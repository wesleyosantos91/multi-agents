- Autenticação e autorização
- Segredos hardcoded
- Dados sensíveis em logs
- Hardening de bordas
- Superfícies de abuso
- OWASP Top 10 aplicáveis
- Riscos críticos para produção

## Entrada do usuário
$ARGUMENTS

"""
